name               = "axto-api"
main               = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.axto.dev/*", zone_name = "axto.dev" }
]

# ── D1 Database ──────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "axto-db"
database_id   = "${D1_DATABASE_ID}"

# ── KV Namespaces ────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id      = "${KV_NAMESPACE_ID}"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "${KV_NAMESPACE_ID}"

# ── R2 Bucket ────────────────────────────────────────────
[[r2_buckets]]
binding     = "OUTPUTS"
bucket_name = "axto-outputs"

# ── Scheduled jobs (72h TTL cleanup) ─────────────────────
[[triggers]]
crons = ["*/30 * * * *"]   # every 30 minutes — delete expired outputs

# ── Non-secret vars ──────────────────────────────────────
[vars]
APP_ENV          = "production"
APP_DOMAIN       = "axto.dev"
API_DOMAIN       = "api.axto.dev"
SESSION_TTL_SECS = "86400"
OUTPUT_TTL_SECS  = "259200"   # 72 hours = 3 days

# ── Secrets (set via wrangler secret put or GitHub Actions) ──
# JWT_SECRET
# ADMIN_TOTP_SECRET
# OPENAI_API_KEY
# ANTHROPIC_API_KEY
# REPLICATE_API_TOKEN
# RUNWAYML_API_KEY
# ELEVENLABS_API_KEY
# SUNO_API_KEY

# ── DB Migrations ─────────────────────────────────────────
[migrations]
migrations_dir = "../../packages/database/migrations"

# ── Staging ───────────────────────────────────────────────
[env.staging]
name   = "axto-api-staging"
routes = [{ pattern = "api-staging.axto.dev/*", zone_name = "axto.dev" }]
[env.staging.vars]
APP_ENV    = "staging"
APP_DOMAIN = "staging.axto.dev"
API_DOMAIN = "api-staging.axto.dev"
