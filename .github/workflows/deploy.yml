name: 🚀 Deploy AXTO — axto.dev

on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 9.1.0
  NODE_VERSION: 20

jobs:
  # ── 1. QUALITY GATE ─────────────────────────────────────
  quality:
    name: 🔍 Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm lint

  # ── 2. BUILD ─────────────────────────────────────────────
  build:
    name: 🏗 Build All Apps
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.axto.dev' || 'https://api-staging.axto.dev' }}
          VITE_APP_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

  # ── 3. DB MIGRATIONS ─────────────────────────────────────
  migrate:
    name: 🗄 D1 Migrations
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm wrangler d1 migrations apply axto-db --remote --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 4. DEPLOY API ─────────────────────────────────────────
  deploy-api:
    name: ⚡ Deploy API → api.axto.dev
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://api.axto.dev' || 'https://api-staging.axto.dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Push secrets to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.JWT_SECRET }}"           | pnpm wrangler secret put JWT_SECRET           --name axto-api
          echo "${{ secrets.ADMIN_TOTP_SECRET }}"    | pnpm wrangler secret put ADMIN_TOTP_SECRET    --name axto-api
          echo "${{ secrets.OPENAI_API_KEY }}"       | pnpm wrangler secret put OPENAI_API_KEY       --name axto-api
          echo "${{ secrets.ANTHROPIC_API_KEY }}"    | pnpm wrangler secret put ANTHROPIC_API_KEY    --name axto-api
          echo "${{ secrets.REPLICATE_API_TOKEN }}"  | pnpm wrangler secret put REPLICATE_API_TOKEN  --name axto-api
          echo "${{ secrets.RUNWAYML_API_KEY }}"     | pnpm wrangler secret put RUNWAYML_API_KEY     --name axto-api
          echo "${{ secrets.ELEVENLABS_API_KEY }}"   | pnpm wrangler secret put ELEVENLABS_API_KEY   --name axto-api
          echo "${{ secrets.SUNO_API_KEY }}"         | pnpm wrangler secret put SUNO_API_KEY         --name axto-api
      - name: Deploy Worker
        run: pnpm wrangler deploy --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}

  # ── 5. DEPLOY WEB ─────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web → axto.dev
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://axto.dev' || 'https://staging.axto.dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: apps/web/dist }
      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Deploy to CF Pages
        run: |
          pnpm wrangler pages deploy apps/web/dist \
            --project-name axto-web \
            --branch ${{ github.ref == 'refs/heads/main' && 'main' || 'staging' }} \
            --commit-hash ${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 6. SMOKE TEST ─────────────────────────────────────────
  smoke:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Health check API
        run: |
          for i in 1 2 3 4 5; do
            S=$(curl -sf -o /dev/null -w "%{http_code}" https://api.axto.dev/health)
            [ "$S" = "200" ] && echo "✅ API healthy" && break
            echo "⏳ Attempt $i — HTTP $S, waiting 10s..." && sleep 10
          done
          [ "$S" = "200" ] || exit 1
      - name: Health check Web
        run: |
          S=$(curl -sf -o /dev/null -w "%{http_code}" https://axto.dev)
          echo "Web: HTTP $S"

  # ── 7. SUMMARY ────────────────────────────────────────────
  summary:
    name: 📣 Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web, smoke]
    if: always()
    steps:
      - run: |
          echo "## 🚀 AXTO Deploy — $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| API Worker | ${{ needs.deploy-api.result == 'success' && '✅ Live' || '❌ Failed' }} | https://api.axto.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Pages  | ${{ needs.deploy-web.result == 'success' && '✅ Live' || '❌ Failed' }} | https://axto.dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\` · **Author:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
