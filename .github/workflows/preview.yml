name: 🔭 PR Preview Deploy

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.1.0
  NODE_VERSION: 20

jobs:
  preview:
    name: 🔭 Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build (preview)
        run: pnpm --filter web build
        env:
          VITE_API_URL: https://api.axto.dev
          VITE_APP_ENV: preview
      - name: Deploy preview to CF Pages
        id: pages
        run: |
          OUTPUT=$(pnpm wrangler pages deploy apps/web/dist \
            --project-name axto-web \
            --branch pr-${{ github.event.pull_request.number }} \
            --commit-hash ${{ github.sha }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^ ]+\.pages\.dev' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.pages.outputs.url }}';
            const body = `## 🔭 Preview Deployment Ready\n\n| | |\n|---|---|\n| **Preview URL** | ${url || '_see Actions log_'} |\n| **Commit** | \`${{ github.sha }}\` |\n| **Branch** | \`${{ github.head_ref }}\` |\n\n> Deployed by GitHub Actions · Cleaned up when PR closes`;
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body.includes('Preview Deployment Ready'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
